            } else {

        function renderQuestions() {
            let html = ''; let qIdx = 1;
            testQuestions.forEach(sec => {
                if (sec.type === 'reading') {
                    html += `<div class="card p-6 mb-8 border-l-8 border-blue-600 bg-gray-50"><p class="text-gray-700 italic mb-6 leading-relaxed text-lg">${sec.passage}</p>`;
                    sec.questions.forEach(q => html += buildQ(q, qIdx++));
                    html += `</div>`;
                } else {
                    sec.questions.forEach(q => html += `<div class="card p-6 mb-6 shadow-sm">${buildQ(q, qIdx++)}</div>`);
                }
            });
            document.getElementById('test-container').innerHTML = html;
        }

        function buildQ(q, n) {
            return `
                <div class="mb-10">
                    <p class="font-bold text-xl mb-4 text-blue-900">${n}. ${q.question}</p>
                    <div class="space-y-3">
                        ${q.options.map((opt, i) => `
                            <label class="flex items-center p-4 border-2 rounded-xl cursor-pointer hover:bg-blue-50 transition-all bg-gray-50">
                                <input type="radio" name="q${q.id}" value="${i}" class="w-5 h-5 text-blue-600">
                                <span class="ml-4 text-lg font-medium text-gray-700">${opt}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                let h = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
                let m = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                const tDisp = document.getElementById('timer');
                tDisp.innerText = `${h}:${m}:${s}`;
                if (timeLeft <= 300) tDisp.classList.add('timer-warning');
                if (timeLeft <= 0) autoSubmit();
            }, 1000);
        }

        function autoSubmit() {
            clearInterval(timerId);
            let correct = 0;
            testQuestions.forEach(sec => sec.questions.forEach(q => {
                const sel = document.querySelector(`input[name="q${q.id}"]:checked`);
                if (sel && parseInt(sel.value) === q.answer) correct++;
            }));

            const score = (correct / 40) * 100;
            const finalScore = score.toFixed(1);

            // SIMPAN KE FIREBASE TANPA CALLBACK AGAR CEPAT
            database.ref('results/' + currentUser.nim).set({
                nim: currentUser.nim,
                name: currentUser.name,
                score: finalScore,
                status: score >= 70 ? 'PASS' : 'REMEDIAL',
                time: new Date().toLocaleString()
            });

            // TAMPILKAN HASIL SETELAH JEDA 1 DETIK
            setTimeout(() => {
                document.getElementById('final-score').innerText = finalScore;
                document.getElementById('final-status').innerText = score >= 70 ? "PASSED" : "REMEDIAL REQUIRED";
                document.getElementById('test-page').classList.add('hidden');
                document.getElementById('result-modal').classList.remove('hidden');
            }, 1000);
        }

        document.getElementById('submit-test').onclick = () => {
            if(confirm('Apakah Anda yakin ingin mengirim jawaban sekarang?')) autoSubmit();
        };

        // ADMIN PANEL REAL-TIME
        function showAdmin() {
            document.getElementById('landing-page').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            database.ref('results').on('value', (snap) => {
                const data = snap.val() || {}; 
                const tbody = document.getElementById('admin-table-body');
                tbody.innerHTML = '';
                for (let id in data) {
                    const r = data[id];
                    tbody.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-4 font-mono font-bold">${r.nim}</td>
                            <td class="p-4 font-medium uppercase">${r.name}</td>
                            <td class="p-4 text-center font-black text-xl text-blue-800">${r.score}</td>
                            <td class="p-4 text-center"><span class="px-3 py-1 rounded-full font-bold ${r.status==='PASS'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${r.status}</span></td>
                            <td class="p-4 text-xs font-mono text-gray-500">${r.time}</td>
                            <td class="p-4 text-center"><button onclick="deleteRes('${r.nim}')" class="text-red-500 hover:scale-125 transition"><i class="fas fa-trash"></i></button></td>
                        </tr>`;
                }
            });
        }

        window.deleteRes = (nim) => { if(confirm('Hapus data?')) database.ref('results/' + nim).remove(); };
        document.getElementById('export-btn').onclick = () => { 
            const table = document.querySelector("table");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "Hasil_UAS_English.xlsx"); 
        };

        document.oncopy = (e) => { e.preventDefault(); alert("Jangan menyontek!"); };
